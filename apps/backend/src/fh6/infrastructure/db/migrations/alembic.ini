[alembic]
# Paths resolve relative to this file (%(here)s), so the same alembic.ini
# works regardless of where the package is checked out. The Phase 1 copy
# left absolute /opt/fh6-racer-backend/... paths here, which silently
# meant migrations still ran against the legacy repo's versions/ dir.
script_location = %(here)s
prepend_sys_path = %(here)s/../../../..
sqlalchemy.url = postgresql+asyncpg://fh6:fh6@127.0.0.1:5432/fh6
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
