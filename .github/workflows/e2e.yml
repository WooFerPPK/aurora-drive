# Intentionally inert: no runner is wired up yet. Runs the Playwright
# smoke suite against `make dev` (backend + vite + UDP pump). See
# apps/web/e2e/ for the specs and /opt/fh6-racer-refactor-plan.md Phase 12.

name: e2e

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/backend/**'
      - 'packages/contract/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/backend/**'
      - 'packages/contract/**'
      - '.github/workflows/e2e.yml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: 'apps/backend/uv.lock'

      - name: Pin Python 3.12
        run: uv python install 3.12

      - name: Sync backend deps (incl. dev extras)
        working-directory: apps/backend
        run: uv sync --extra dev --frozen

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Install web deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web/client
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        run: make e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/client/playwright-report/
          retention-days: 7
